<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forex Trade -- Results</title>
<!-- Standalone FOREX server: served at ROOT, so NO <base href> (a base would 404 relative
     asset/api URLs). Sortable/filterable full backtest record; scales to thousands of rows. -->
<link rel="icon" type="image/svg+xml" href="static/favicon.svg">
<link rel="stylesheet" href="/shared/theme.css?v={{ASSET_V}}">
<link rel="stylesheet" href="static/style.css?v={{ASSET_V}}">
</head>
<body class="view-backtest" data-view="backtest">
<!-- Backtest accent (green) -- this is the LAB record, no money in play. -->
<!-- SAME flat nav as the chart page; Results is active. No chart.js here, so the chart-view links
     are real navigations to /?view=X. -->
<nav class="navbar">
  <span class="brand">FOREX</span>
  <div class="views">
    <a href="/?view=backtest" data-view="backtest">Backtest</a>
    <a href="/results" class="active">Results</a>
    <a href="/?view=paper" data-view="paper">Paper</a>
    <a href="/?view=live"  data-view="live">Live</a>
    <a href="/pnl">PnL</a>
  </div>
  <a href="https://josoka.com" class="site" target="_blank" rel="noopener"><img src="/shared/josoka-flame.webp" alt="Josoka">josoka.com</a>
</nav>
<header class="results-header">
  <h1>RESULTS <span class="subtitle">every backtest in the gauntlet</span></h1>
  <div class="spacer"></div>
  <div class="pdim" id="meta"></div>
</header>
<div class="filters" id="filters">
  <input type="search" id="q" placeholder="filter by id / style / indicator...">
  <span class="sep"></span>
  <span class="slabel">cadence</span>
  <div class="fgroup" id="cadFilter"></div>
  <span class="sep"></span>
  <span class="slabel">verdict</span>
  <div class="fgroup" id="verFilter"></div>
  <span class="sep"></span>
  <label class="chk"><input type="checkbox" id="gateOnly"> gate pass</label>
  <label class="chk"><input type="checkbox" id="fwdOnly"> forward</label>
  <span class="spacer"></span>
  <span class="pdim" id="count"></span>
</div>
<main class="results-main">
  <div class="tablewrap">
    <table id="tbl">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>
<script src="static/results.js?v={{ASSET_V}}"></script>
</body>
</html>
